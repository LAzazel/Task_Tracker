services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mywebapp
      POSTGRES_USER: mywebapp
      POSTGRES_PASSWORD: mywebapp_pass
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - mywebapp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mywebapp -d mywebapp"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    environment:
      MYWEBAPP_CONFIG: /etc/mywebapp/config.ini
      PYTHONPATH: /opt/mywebapp
    volumes:
      - ./docker/config.ini:/etc/mywebapp/config.ini:ro
    depends_on:
      - db
    command: >
      sh -c "python scripts/migrate.py && gunicorn --workers 2 --bind 0.0.0.0:5000 mywebapp.wsgi:app"
    restart: unless-stopped
    networks:
      - mywebapp-net

  nginx:
    image: nginx:1.24-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - mywebapp-net

volumes:
  db-data:

networks:
  mywebapp-net:
    driver: bridge


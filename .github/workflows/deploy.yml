---
name: CD

on:
  push:
    tags: ['*']

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy to target node
        env:
          SSH_HOST: ${{ secrets.TARGET_HOST }}
          SSH_USER: ${{ secrets.TARGET_USER }}
          SSH_PORT: ${{ secrets.TARGET_PORT }}
          SSH_KEY: ${{ secrets.TARGET_SSH_KEY }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/task_tracker
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          printf "%s" "$SSH_KEY" > ~/.ssh/id_ed25519
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            "mkdir -p /opt/mywebapp"
          scp -P "$SSH_PORT" -o StrictHostKeyChecking=no \
            deploy/target_deploy.sh "$SSH_USER@$SSH_HOST:~/target_deploy.sh"
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            "sudo mv ~/target_deploy.sh /opt/mywebapp/target_deploy.sh && \
            GHCR_USER='$GHCR_USER' GHCR_TOKEN='$GHCR_TOKEN' \
            IMAGE_NAME='$IMAGE_NAME' IMAGE_TAG='$IMAGE_TAG' \
            bash /opt/mywebapp/target_deploy.sh"

      - name: Verify deployment
        env:
          SSH_HOST: ${{ secrets.TARGET_HOST }}
          SSH_USER: ${{ secrets.TARGET_USER }}
          SSH_PORT: ${{ secrets.TARGET_PORT }}
          SSH_KEY: ${{ secrets.TARGET_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          printf "%s" "$SSH_KEY" > ~/.ssh/id_ed25519
          scp -P "$SSH_PORT" -o StrictHostKeyChecking=no \
            deploy/verify.sh "$SSH_USER@$SSH_HOST:~/verify.sh"
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            "sudo mv ~/verify.sh /opt/mywebapp/verify.sh && \
            bash /opt/mywebapp/verify.sh"
